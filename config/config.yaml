# 系统全局配置
system:
  run_days: 30                  # 一次性模拟的天数

# 模拟账户配置
account:
  initial_cash: 100000.0        # 初始资金 (十万元)
  commission_rate: 0.00025      # 交易佣金费率 (万分之二点五)
  tax_rate: 0.0005              # 印花税率 (千分之零点五，仅卖出收取)
  min_commission: 5.0           # 最低佣金 (5元)

# 回测标的配置 (东财 A 股代码格式)
stock_pool:

  - "sz000858"  # 五粮液
  - "sh601318"  # 中国平安
  - "sh600036"  # 招商银行

# 量化策略配置
strategy:
  name: "Double_MA"             # 当前启用的策略：双均线策略
  parameters:
    fast_period: 5              # 短期均线周期
    slow_period: 20             # 长期均线周期